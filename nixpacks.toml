[phases.setup]
nixPkgs = ["nodejs_22"]

[variables]
COREPACK_INTEGRITY_KEYS = "0"
NODE_ENV = "production"

[phases.install]
cmds = ["corepack enable && corepack prepare pnpm@10.26.1 --activate && pnpm install --frozen-lockfile=false"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/stock-algo run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node artifacts/api-server/dist/index.cjs"
