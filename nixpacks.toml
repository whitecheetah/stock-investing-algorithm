[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g pnpm@latest && pnpm install --frozen-lockfile=false"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/stock-algo run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node artifacts/api-server/dist/index.cjs"
